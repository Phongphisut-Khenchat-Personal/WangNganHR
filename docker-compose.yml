services:
  postgres:
    image: postgres:16-alpine
    # ชื่อ container เดิม (janomehr_db) — ใช้ connect-db.ps1 เข้า DB
    container_name: janomehr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: janomehr
      POSTGRES_USER: janome
      POSTGRES_PASSWORD: janome1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: janomehr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: