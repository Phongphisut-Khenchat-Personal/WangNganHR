<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        <span id="blazor-error-message"></span>
        <a href="." class="reload" id="blazor-error-reload"></a>
        <span class="dismiss" id="blazor-error-dismiss" title=""><i class="fa-solid fa-xmark" aria-hidden="true"></i></span>
    </div>
    <script src="_framework/blazor.webassembly.958z1vx7fr.js"></script>
    <script>
        window.janomeHr = {
            setLang: function (culture) { document.documentElement.lang = culture; },
            applyErrorUi: function (strings) {
                var msg = document.getElementById('blazor-error-message');
                var reload = document.getElementById('blazor-error-reload');
                var dismiss = document.getElementById('blazor-error-dismiss');
                if (msg) msg.textContent = strings.message || '';
                if (reload) reload.textContent = strings.reload || 'Reload';
                if (dismiss) dismiss.title = strings.dismiss || 'Dismiss';
            }
        };
        window.addEventListener('load', function () {
            var ui = document.getElementById('blazor-error-ui');
            var dismiss = ui && ui.querySelector('.dismiss');
            if (dismiss) dismiss.onclick = function () { ui.style.display = 'none'; };

            var culture = localStorage.getItem('janomehr.lang') || 'en';
            fetch('locales/' + culture + '.json')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    window.janomeHr.applyErrorUi({
                        message: data.Error_Message,
                        reload: data.Error_Reload,
                        dismiss: data.Error_Dismiss
                    });
                })
                .catch(function () {
                    window.janomeHr.applyErrorUi({
                        message: 'An error occurred. Please reload the page.',
                        reload: 'Reload',
                        dismiss: 'Dismiss'
                    });
                });
        });
    </script>
